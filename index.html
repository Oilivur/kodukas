<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodukas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Kodukas</h1>
</header>

<nav>
    <div class="box">
        <h3>Kraam</h3>
        <a href="https://ww-fmovies.com" target="_blank">Filmid</a>
        <a href="https://en.fmoviesz-to.com" target="_blank">Filmid II</a>
    </div>

    <div class="box">
        <h3>Discgolf</h3>
        <a href="https://discgolf.ee/" target="_blank">discgolf.ee</a>
        <a href="https://thuledg.ee/" target="_blank">thuledg.ee</a>
        <a href="https://discgolfar.ee/" target="_blank">discgolfar.ee</a>
    </div>
</nav>

<main>
    <section class="world-cup-section">
        <div class="world-cup-header">
            <div class="world-cup-title">
                <p class="eyebrow">FIFA World Cup 2026</p>
                <h2>MM Mängud</h2>
            </div>

            <div class="world-cup-actions">
                <button id="refreshWorldCup" type="button">Värskenda</button>
                <span id="worldCupUpdated">Laeb...</span>
            </div>

            <div id="worldCupHeroStats" class="world-cup-hero-stats"></div>
        </div>

        <div class="world-cup-controls">
            <input id="teamSearch" type="text" placeholder="Otsi riiki, linna...">

            <select id="stageFilter">
                <option value="">Kogu värk</option>
            </select>
        </div>

        <section>
            <h2 class="section-title">Seis</h2>
            <div id="standingsGrid" class="standings-grid"></div>
        </section>

        <section>
            <h2 class="section-title">Mängud</h2>
            <div id="matchesGrid" class="matches-grid"></div>
        </section>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
